# This is the docker compose file which defines all services (containers) that make up pipeforge
# Think of this as the "boot script" which starts the complete project.

# Containers
services:
  # POSTGRES Container
  postgres:
    image: postgres:18 # Exact version we want download of postgres
    container_name: pipeforge_postgres # Fixed name so other container can reference it
    env_file: .env # Loads DB credentails from .env file
    ports:
      - "5432:5432" # host_port:container_port — lets you connect via pgAdmin or psql locally
    volumes:
      - postgres_data:/var/lib/postgresql # postgres 18 changed this path — persists DB data across container restarts
    healthcheck:
      # docker waits for postgres to be READY before starting api/worker
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s # check every 5 seconds 
      timeout: 5s # fail if no response in 5s
      retries: 5 # retry 5 times before marking unhealthy

  # REDIS Container
  redis:
    image: redis:8
    container_name: pipeforge_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # API Container - FastAPI application
  api:
    build: ./api # build from Dockerfile inside ./api folder
    container_name: pipeforge_api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app # mounts local ./api folder into container — live reload during dev

  # WORKER Container - Background job processor
  worker:
    build: ./worker
    container_name: pipeforge_worker
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./worker:/app

  # NGINX Conatiner - Reverse proxy
  nginx:
    image: nginx:alpine
    container_name: pipeforge_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

# Volumes 
volumes:
  postgres_data:
  redis_data:
