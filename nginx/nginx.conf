# NGINX is a reverse proxy — it sits in front of our FastAPI app.
# All traffic enters through NGINX on port 80.
# NGINX then forwards it to the api container on port 8000.

# Why do we need this if api is already on port 8000?
# 1. Single entry point — in production you only expose port 80/443
# 2. SSL termination — nginx handles HTTPS, api stays plain HTTP
# 3. Load balancing — nginx can split traffic across multiple api instances
# 4. Static files — nginx serves them directly without hitting FastAPI


# EVENTS BLOCK
# Controls how nginx handles connections at OS level.
# worker_connections = max simultaneous connections per worker process.
events {
    worker_connections 1024;
}

# HTTP BLOCK
# Defines how nginx handles HTTP traffic.
# upstream = backend service (our FastAPI app)
# server = the public-facing server (our NGINX instance)
http {
    # UPSTREAM
    # Defines the backend server nginx forwards to.
    # "api" here is the container_name from docker-compose.yml.
    # Docker's internal DNS resolves "pipeforge_api" to the container IP.
    upstream fastapi_app {
        server pipeforge_api:8000;
    }

    # SERVER BLOCK
    # Defines how nginx handles incoming requests.
    # One server block = one virtual host.
    server {
        listen 80;
        server_name localhost;

        # LOCATION BLOCK
        # "/" means match all incoming requests.
        # proxy_pass forwards them to our FastAPI app.
        location / {
            # Forward requests to our upstream FastAPI app
            proxy_pass http://fastapi_app;

            # Set headers so FastAPI knows where the request came from
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WEBSOCKET SUPPORT
        # WebSockets need special headers to upgrade
        # from HTTP to WS protocol.
        # Without this, nginx closes WebSocket connections immediately.
        location /ws {
            proxy_pass http://fastapi_app;
            proxy_http_version 1.1;                     # websockets require HTTP 1.1
            proxy_set_header Upgrade $http_upgrade;     # tells nginx to upgrade connection
            proxy_set_header Connection "upgrade";      # required for websocket handshake
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;                   # keep websocket alive for 1 hour
        }
    }
}
